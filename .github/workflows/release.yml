name: Release

on:
  push:
    branches:
      - main
    paths:
      - packages/react-native-preview-url/package.json
  workflow_dispatch:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.detect.outputs.should_release }}
      version: ${{ steps.detect.outputs.version }}
      tag: ${{ steps.detect.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Detect version and tag presence
        id: detect
        run: |
          version="$(node -p "require('./packages/react-native-preview-url/package.json').version")"
          tag="v$version"
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$tag" >> "$GITHUB_OUTPUT"
          if git rev-parse --verify "refs/tags/$tag" >/dev/null 2>&1; then
            echo "::notice::Tag $tag already exists; skipping release"
            echo "should_release=false" >> "$GITHUB_OUTPUT"
          else
            echo "::notice::Releasing $tag"
            echo "should_release=true" >> "$GITHUB_OUTPUT"
          fi

  publish:
    needs: check
    if: needs.check.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup pnpm
        uses: pnpm/action-setup@a7487c7e89a18df4991f7f222e4898a00d66ddda # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version-file: .nvmrc
          cache: 'pnpm'
          # No `registry-url`: setup-node would write .npmrc with a sentinel
          # NODE_AUTH_TOKEN placeholder that takes precedence over OIDC. Without
          # it, npm publish uses the OIDC token (id-token: write) directly,
          # which is what the npm Trusted Publisher trust expects.

      - name: Upgrade npm for OIDC support
        # npm 10.x (bundled with Node 20) does not implement OIDC registry auth
        # for Trusted Publishers; that landed in npm 11.5.1. Pin to latest 11.x.
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Check formatting
        run: pnpm format:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm --filter react-native-preview-url test --run

      - name: Build library
        run: pnpm prepare

      - name: Publish to npm with provenance
        working-directory: packages/react-native-preview-url
        run: npm publish --provenance --access public

      - name: Create and push tag
        env:
          TAG: ${{ needs.check.outputs.tag }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "$TAG" -m "Release $TAG"
          git push origin "$TAG"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.check.outputs.tag }}
        run: gh release create "$TAG" --generate-notes
