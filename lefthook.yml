pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm oxlint {staged_files}
    format:
      glob: '*.{js,ts,jsx,tsx,json,jsonc,md,yml,yaml}'
      run: pnpm oxfmt --check {staged_files}
    types:
      glob: '*.{js,ts,jsx,tsx}'
      run: pnpm -r typecheck
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: pnpm commitlint --edit
