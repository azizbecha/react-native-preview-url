pre-commit:
  parallel: true
  commands:
    lint:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn oxlint {staged_files}
    format:
      glob: '*.{js,ts,jsx,tsx,json,jsonc,md,yml,yaml}'
      run: yarn oxfmt --check {staged_files}
    types:
      glob: '*.{js,ts,jsx,tsx}'
      run: yarn tsc
commit-msg:
  parallel: true
  commands:
    commitlint:
      run: yarn commitlint --edit
